<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bazar Lizie - Calculadora</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; }
        .product-card { border-bottom: 1px solid #f0f0f0; }
        /* Força a logo a ficar preta para o tema B&W */
        .logo-black { filter: brightness(0); }
    </style>
</head>
<body class="pb-32">

    <!-- HEADER BRANCO COM LOGO PRETA -->
    <header class="bg-white pt-10 pb-6 px-6 text-center border-b border-gray-100">
        <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAMgAAABkCAYAAADD8S9WAAAACXBIWXMAAAsTAAALEwEAmpwYAAAAAXNSR0IArs4c6QAAAARnQU1BAACxjwv8YQUAAALySURBVHgB7d0/SBRRGMDx966IIDpIsIsitSQu0SAt7S0R7S0t0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAt0SAuRfoPgPzT/G1Y6qAAAAAElFTkSuQmCC" 
             alt="Lizie" class="h-10 mx-auto logo-black">
        <p class="text-[10px] uppercase tracking-[0.4em] text-gray-400 mt-4 font-light">Calculadora de Preços</p>
    </header>

    <main class="max-w-md mx-auto" id="lista-produtos">
        <!-- Produtos injetados aqui -->
    </main>

    <!-- BARRA DE TOTAL FIXA -->
    <div class="fixed bottom-0 left-0 right-0 bg-black text-white p-6 flex justify-between items-center shadow-2xl">
        <div>
            <p class="text-[9px] uppercase tracking-widest opacity-50 mb-1">Subtotal</p>
            <p class="text-3xl font-bold" id="valor-total">R$ 0,00</p>
        </div>
        <button onclick="limparCarrinho()" class="text-[10px] uppercase tracking-widest border border-white/20 px-4 py-2 hover:bg-white hover:text-black transition-all">
            Limpar
        </button>
    </div>

    <script>
        // LISTA DE PRODUTOS LIZIE (Altere os preços abaixo)
        const produtos = [
            { id: 1, nome: "T-Shirt Básica", preco: 39.90 },
            { id: 2, nome: "Calça Alfaiataria", preco: 129.00 },
            { id: 3, nome: "Vestido Longo", preco: 189.00 },
            { id: 4, nome: "Blazer Estruturado", preco: 250.00 },
            { id: 5, nome: "Saia Midi", preco: 89.00 },
            { id: 6, nome: "Acessórios", preco: 29.00 }
        ];

        let carrinho = {};

        function renderizarProdutos() {
            const container = document.getElementById('lista-produtos');
            container.innerHTML = produtos.map(p => `
                <div class="product-card p-6 flex justify-between items-center">
                    <div>
                        <h3 class="font-semibold text-gray-900 uppercase text-xs tracking-wider">${p.nome}</h3>
                        <p class="text-gray-400 font-light text-sm mt-1">R$ ${p.preco.toFixed(2).replace('.', ',')}</p>
                    </div>
                    <div class="flex items-center space-x-5">
                        <button onclick="alterarQtd(${p.id}, -1)" class="w-8 h-8 flex items-center justify-center border border-gray-200 text-gray-400 hover:border-black hover:text-black">-</button>
                        <span id="qtd-${p.id}" class="w-4 text-center font-bold text-sm">0</span>
                        <button onclick="alterarQtd(${p.id}, 1)" class="w-8 h-8 bg-black text-white flex items-center justify-center hover:bg-gray-800">+</button>
                    </div>
                </div>
            `).join('');
        }

        function alterarQtd(id, delta) {
            carrinho[id] = (carrinho[id] || 0) + delta;
            if (carrinho[id] < 0) carrinho[id] = 0;
            document.getElementById(`qtd-${id}`).innerText = carrinho[id];
            calcularTotal();
        }

        function calcularTotal() {
            let total = 0;
            produtos.forEach(p => {
                total += (carrinho[p.id] || 0) * p.preco;
            });
            document.getElementById('valor-total').innerText = `R$ ${total.toFixed(2).replace('.', ',')}`;
        }

        function limparCarrinho() {
            if(confirm("Limpar sua simulação?")) {
                carrinho = {};
                produtos.forEach(p => document.getElementById(`qtd-${p.id}`).innerText = "0");
                calcularTotal();
            }
        }

        renderizarProdutos();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bazar Lizie - Calculadora</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .product-card { transition: all 0.2s ease; }
        .product-card:active { transform: scale(0.98); }
        /* Esconder scrollbar da barra de categorias */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-white pb-32">

    <!-- HEADER COM LOGO -->
    <header class="bg-black text-white py-8 px-6 text-center shadow-xl">
        <img src="logo.png" alt="Lizie" class="h-12 mx-auto mb-2">
        <p class="text-xs uppercase tracking-[0.3em] opacity-70 font-light">Calculadora de Compras</p>
    </header>

    <!-- ÁREA DE BUSCA E FILTROS -->
    <div class="sticky top-0 bg-white z-10 p-4 space-y-4 shadow-sm">
        <!-- Input de Busca -->
        <div class="relative">
            <input type="text" id="busca" oninput="filtrarProdutos()" placeholder="Buscar produto..." 
                class="w-full bg-gray-100 border-none rounded-none py-3 px-4 text-sm focus:ring-2 focus:ring-black outline-none transition-all">
        </div>

        <!-- Categorias Recomendadas -->
        <div class="flex overflow-x-auto space-x-2 no-scrollbar pb-2">
            <button onclick="filtrarCategoria('')" class="whitespace-nowrap px-4 py-1.5 rounded-full border border-black text-[10px] uppercase font-bold bg-black text-white transition-all">Todos</button>
            <button onclick="filtrarCategoria('Vestido')" class="whitespace-nowrap px-4 py-1.5 rounded-full border border-gray-200 text-[10px] uppercase font-bold hover:border-black transition-all">Vestidos</button>
            <button onclick="filtrarCategoria('Saia')" class="whitespace-nowrap px-4 py-1.5 rounded-full border border-gray-200 text-[10px] uppercase font-bold hover:border-black transition-all">Saias</button>
            <button onclick="filtrarCategoria('Blusa')" class="whitespace-nowrap px-4 py-1.5 rounded-full border border-gray-200 text-[10px] uppercase font-bold hover:border-black transition-all">Blusas</button>
            <button onclick="filtrarCategoria('Calça')" class="whitespace-nowrap px-4 py-1.5 rounded-full border border-gray-200 text-[10px] uppercase font-bold hover:border-black transition-all">Calças</button>
            <button onclick="filtrarCategoria('Acessório')" class="whitespace-nowrap px-4 py-1.5 rounded-full border border-gray-200 text-[10px] uppercase font-bold hover:border-black transition-all">Acessórios</button>
        </div>
    </div>

    <!-- LISTA DE PRODUTOS -->
    <main class="p-6 max-w-md mx-auto space-y-2" id="lista-produtos">
        <!-- Inserido via JS -->
    </main>

    <!-- BARRA DE TOTAL -->
    <div class="fixed bottom-0 left-0 right-0 bg-black text-white p-6 shadow-[0_-10px_20px_rgba(0,0,0,0.1)] flex justify-between items-center z-20">
        <div>
            <p class="text-[10px] uppercase tracking-widest opacity-60">Total Estimado</p>
            <p class="text-3xl font-black" id="valor-total">R$ 0,00</p>
        </div>
        <button onclick="limparCarrinho()" class="border border-white/30 hover:bg-white hover:text-black px-4 py-2 rounded-none text-xs uppercase tracking-widest transition-all">
            Limpar
        </button>
    </div>

    <script>
        // LISTA DE PRODUTOS COM CATEGORIAS
        const produtos = [
            { id: 1, nome: "Blusa Lizie Seda", preco: 49.90, categoria: "Blusa" },
            { id: 2, nome: "Calça Alfaiataria", preco: 89.90, categoria: "Calça" },
            { id: 3, nome: "Vestido Midi Floral", preco: 120.00, categoria: "Vestido" },
            { id: 4, nome: "Acessório Gold - Colar", preco: 25.00, categoria: "Acessório" },
            { id: 5, nome: "Saia Plissada Off-White", preco: 75.00, categoria: "Saia" },
            { id: 6, nome: "Vestido Curto Festa", preco: 150.00, categoria: "Vestido" },
            { id: 7, nome: "Blusa Básica Algodão", preco: 35.00, categoria: "Blusa" },
            { id: 8, nome: "Calça Jeans High", preco: 95.00, categoria: "Calça" }
        ];

        let carrinho = {};

        // Função para renderizar a lista (pode receber uma lista filtrada)
        function renderizarProdutos(lista = produtos) {
            const container = document.getElementById('lista-produtos');
            
            if (lista.length === 0) {
                container.innerHTML = `<p class="text-center text-gray-400 py-10">Nenhum produto encontrado.</p>`;
                return;
            }

            container.innerHTML = lista.map(p => `
                <div class="product-card bg-white p-5 border-b border-gray-100 flex justify-between items-center">
                    <div>
                        <h3 class="font-bold text-gray-900 uppercase text-sm tracking-tight">${p.nome}</h3>
                        <p class="text-gray-500 font-light text-xs mb-1">${p.categoria}</p>
                        <p class="text-gray-900 font-medium">R$ ${p.preco.toFixed(2).replace('.', ',')}</p>
                    </div>
                    <div class="flex items-center space-x-4">
                        <button onclick="alterarQtd(${p.id}, -1)" class="w-8 h-8 border border-black flex items-center justify-center text-xl font-light hover:bg-black hover:text-white transition-colors">-</button>
                        <span id="qtd-${p.id}" class="w-4 text-center font-bold text-lg">${carrinho[p.id] || 0}</span>
                        <button onclick="alterarQtd(${p.id}, 1)" class="w-8 h-8 bg-black text-white flex items-center justify-center text-xl font-light hover:bg-gray-800 transition-colors">+</button>
                    </div>
                </div>
            `).join('');
        }

        // Função de busca por texto
        function filtrarProdutos() {
            const termo = document.getElementById('busca').value.toLowerCase();
            const filtrados = produtos.filter(p => 
                p.nome.toLowerCase().includes(termo) || 
                p.categoria.toLowerCase().includes(termo)
            );
            renderizarProdutos(filtrados);
        }

        // Função de clique nas categorias
        function filtrarCategoria(categoria) {
            document.getElementById('busca').value = categoria;
            filtrarProdutos();
            
            // Estilizar botão ativo (opcional)
            const botoes = document.querySelectorAll('.no-scrollbar button');
            botoes.forEach(btn => {
                if(btn.innerText.toLowerCase() === categoria.toLowerCase() || (categoria === '' && btn.innerText === 'TODOS')) {
                    btn.classList.add('bg-black', 'text-white');
                    btn.classList.remove('text-gray-900');
                } else {
                    btn.classList.remove('bg-black', 'text-white');
                }
            });
        }

        function alterarQtd(id, delta) {
            carrinho[id] = (carrinho[id] || 0) + delta;
            if (carrinho[id] < 0) carrinho[id] = 0;
            
            const el = document.getElementById(`qtd-${id}`);
            if(el) el.innerText = carrinho[id];
            calcularTotal();
        }

        function calcularTotal() {
            let total = 0;
            produtos.forEach(p => {
                total += (carrinho[p.id] || 0) * p.preco;
            });
            document.getElementById('valor-total').innerText = `R$ ${total.toFixed(2).replace('.', ',')}`;
        }

        function limparCarrinho() {
            if(confirm("Deseja limpar todos os itens selecionados?")) {
                carrinho = {};
                renderizarProdutos(); // Re-renderiza para zerar os contadores visuais
                calcularTotal();
            }
        }

        // Inicialização
        renderizarProdutos();
    </script>
</body>
</html>
